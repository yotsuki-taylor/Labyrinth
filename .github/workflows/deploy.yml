name: Deploy Mini App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # No package-lock.json in the repo, so use install (not ci).
      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build --workspace=apps/web
        env:
          # Public URL of the API. Set this in repo Settings → Secrets and
          # variables → Actions → Variables. Until then it falls back to
          # "/api", which will NOT work on github.io (no backend there).
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      # GitHub Pages serves index.html for "/" but 404s on any other path.
      # Serving index.html as 404.html makes client-side routing work.
      - name: Add SPA fallback
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
